name: chirper

services:
  db:
    image: postgres:14-alpine
    ports:
      - ${DB_PORT}:5432
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    networks:
      - chirper-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./.data/redis:/data
    networks:
      - chirper-network
  
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - ./.data/redisinsight:/data
    networks:
      - chirper-network

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - chirper-network

networks:
  chirper-network:
    driver: bridge
